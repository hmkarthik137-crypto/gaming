```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Store Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-image: 
    radial-gradient(circle at top left,#6d28d9,#020617 40%),
    radial-gradient(circle at bottom right,#0ea5e9,#020617 40%);
    overflow:hidden;
}

.register-card{
    width:450px;
    padding:40px;
    border-radius:25px;
    background:rgba(15,23,42,0.8);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);

    box-shadow:
    0 0 30px rgba(168,85,247,.6),
    0 0 60px rgba(59,130,246,.4);

    animation:floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

.logo{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-size:32px;
}

h1 span{
    color:#a855f7;
}

.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:15px;
    transition:.3s;
}

.input-group input::placeholder{
    color:#94a3b8;
}

.input-group input:focus{
    box-shadow:0 0 15px #9333ea;
    border:1px solid #9333ea;
}

.register-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-size:17px;
    font-weight:600;

    background:linear-gradient(
        135deg,
        #9333ea,
        #3b82f6
    );

    transition:.4s;
}

.register-btn:hover{
    transform:translateY(-3px);

    box-shadow:
    0 0 20px #9333ea,
    0 0 40px #3b82f6;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#60a5fa;
    text-decoration:none;
}

.login-link a:hover{
    color:#c084fc;
}

@media(max-width:500px){

.register-card{
    width:92%;
    padding:30px;
}

}

</style>

</head>
<body>

<div class="register-card">

    <div class="logo">🎮</div>

    <h1>Game Store <span>Register</span></h1>

    <form id="registerForm">

        <div class="input-group">
            <input
                type="text"
                id="username"
                placeholder="Username"
                required
            >
        </div>

        <div class="input-group">
            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
            >
        </div>

        <div class="input-group">
            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >
        </div>

        <div class="input-group">
            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
                required
            >
        </div>

        <button
            type="submit"
            class="register-btn">
            Create Account
        </button>

    </form>

    <div class="login-link">
        <a href="login.html">
            Already have an account? Login
        </a>
    </div>

</div>

<script>

document
.getElementById("registerForm")
.addEventListener("submit",function(e){

    e.preventDefault();

    const password =
    document.getElementById("password").value;

    const confirmPassword =
    document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){

        alert("Passwords do not match");
        return;
    }

    alert("Registration Successful");

    window.location.href =
    "login.html";

});

</script>

</body>
</html>
