<!DOCTYPE html>
<html>
<head>
    <title>Game Categories</title>
    <style>
        .dropdown{
    position:relative;
}

.dropdown-content{
    display:none;
    position:absolute;
    top:60px;
    left:0;
    background:#111827;
    min-width:180px;
    border-radius:10px;
}

.dropdown-content a{
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
}

.dropdown:hover .dropdown-content{
    display:block;
}
    </style>
</head>
<body style="background:#081229;color:white;font-family:Arial">

    <h1>Game Categories</h1>

    <ul>
        <li>Action Games</li>
        <li>Adventure Games</li>
        <li>Racing Games</li>
        <li>Sports Games</li>
        <li>Battle Royale</li>
        <li>RPG Games</li>
    </ul>

</body>
</html>
