```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Store Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top left,#7c3aed,#020617 35%),
    radial-gradient(circle at bottom right,#2563eb,#020617 35%);
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#9333ea;
    border-radius:50%;
    filter:blur(150px);
    top:-100px;
    left:-100px;
    opacity:.4;
}

body::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#2563eb;
    border-radius:50%;
    filter:blur(150px);
    bottom:-100px;
    right:-100px;
    opacity:.4;
}

.login-container{
    width:430px;
    padding:40px;
    border-radius:25px;
    background:rgba(15,23,42,0.8);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:
    0 0 25px rgba(168,85,247,.5),
    0 0 50px rgba(37,99,235,.3);
    z-index:10;
}

.game-icon{
    text-align:center;
    font-size:55px;
    margin-bottom:10px;
}

.login-container h1{
    text-align:center;
    color:white;
    margin-bottom:8px;
    font-size:34px;
}

.login-container h1 span{
    color:#a855f7;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:15px;
    transition:.3s;
}

.input-group input::placeholder{
    color:#94a3b8;
}

.input-group input:focus{
    box-shadow:0 0 15px rgba(168,85,247,.5);
    border:1px solid #a855f7;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        135deg,
        #9333ea,
        #2563eb
    );
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.4s;
}

.login-btn:hover{
    transform:translateY(-3px);
    box-shadow:
    0 0 20px #9333ea,
    0 0 35px #2563eb;
}

.options{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#60a5fa;
}

.options a:hover{
    color:#c084fc;
}

.register-link{
    text-align:center;
    margin-top:25px;
    color:#cbd5e1;
}

.register-link a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:600;
}

.register-link a:hover{
    color:#c084fc;
}

@media(max-width:500px){

.login-container{
    width:92%;
    padding:30px;
}

}

</style>
</head>

<body>

<div class="login-container">

<div class="game-icon">🎮</div>

<h1>Game <span>Store</span></h1>

<p class="subtitle">
Login to Continue Gaming
</p>

<form id="loginForm">

<div class="input-group">
<input
type="email"
id="email"
placeholder="Enter Email"
required>
</div>

<div class="input-group">
<input
type="password"
id="password"
placeholder="Enter Password"
required>
</div>

<button
type="submit"
class="login-btn">
Login
</button>

</form>

<div class="options">
<a href="#">Forgot Password?</a>

</div>

<div class="register-link">
Don't have an account?
<a href="signin.html">Register</a>
</div>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    if(email === "" || password === ""){

        alert("Please fill all fields");
        return;

    }

    // Save login status
    function login() {

    // Save login status
    localStorage.setItem("isLoggedIn", "true");

    // Redirect to home page
    window.location.href = "index.html";

}
});

</script>

</body>
</html>
```
